<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dark Mode for Google Docs</title>
    <style>
      :root { color-scheme: light dark; }
      body {
        max-width: 640px; margin: 0 auto; padding: 64px 20px;
        font: 16px/1.6 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        color: #202124; background: #fff;
      }
      @media (prefers-color-scheme: dark) {
        body { color: #e8eaed; background: #202124; } a { color: #8ab4f8; }
      }
      h1 { font-size: 1.8rem; }
    </style>
  </head>
  <body>
    <h1>🌙 Dark Mode for Google Docs</h1>
    <p>A Chrome extension that gives Google Docs a comfortable dark theme.</p>
    <p><a href="./privacy.html">Privacy Policy</a></p>
  </body>
</html>
