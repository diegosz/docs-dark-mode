name: Lint

# Fast, deterministic, no-network checks on every push and PR.
on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Validate manifest.json
        run: |
          node -e "const m=require('./manifest.json'); if(m.manifest_version!==3){throw new Error('manifest_version must be 3')} console.log('manifest OK — v'+m.version)"

      - name: Lint CSS selectors against the registry
        run: DDE_TODAY=$(date -u +%F) node tools/lint-selectors.mjs

      - name: Syntax-check JavaScript
        run: |
          node --check content/content.js
          node --check popup/popup.js
