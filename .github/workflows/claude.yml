name: Claude

# Responds to @claude mentions on issues and PRs (tag mode). The selector-drift
# workflow can @claude-mention a drift issue (when AUTO_FIX_ON_DRIFT=true) so
# Claude opens a fix PR automatically — but the PR is always human-reviewed and
# merged, never auto-merged.
#
# Required secret: ANTHROPIC_API_KEY (Settings -> Secrets and variables -> Actions).
# Install the Claude GitHub App once: https://github.com/apps/claude
on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  claude:
    # Only spin up a runner when @claude is actually mentioned.
    if: >
      contains(github.event.comment.body, '@claude') ||
      contains(github.event.issue.body, '@claude') ||
      contains(github.event.issue.title, '@claude')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: |
            --allowedTools Edit,Read,Write,Bash
            --max-turns 25
