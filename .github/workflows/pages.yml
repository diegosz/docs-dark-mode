name: Deploy privacy page (GitHub Pages)

# Publishes the docs/ folder (privacy.html + index.html) to GitHub Pages.
# One-time setup: repo Settings -> Pages -> Build and deployment -> Source:
# "GitHub Actions". The privacy policy is then served at:
#   https://<owner>.github.io/<repo>/privacy.html
# Paste that URL into the Chrome Web Store listing's Privacy tab.
on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v4
        with:
          path: ./docs
      - id: deployment
        uses: actions/deploy-pages@v4
